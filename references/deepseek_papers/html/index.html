// ============================================================
// STATE
// ============================================================
let currentPaperId = null;
let isCollapsed = false;
let isDark = false;

// ============================================================
// SIDEBAR
// ============================================================
function buildSidebar() {
  const list = document.getElementById('paperList');
  PAPERS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'paper-item';
    div.dataset.id = p.id;
    div.innerHTML = `<span class="num">${String(p.id).padStart(2,'0')}</span>
      <div class="title">${p.zhTitle}<span class="en-sub">${p.enTitle}</span></div>`;
    div.addEventListener('click', () => selectPaper(p.id));
    list.appendChild(div);
  });
}

function toggleSidebar() {
  isCollapsed = !isCollapsed;
  document.getElementById('sidebar').classList.toggle('collapsed', isCollapsed);
  localStorage.setItem('sidebarCollapsed', isCollapsed);
  // On mobile, toggle overlay open/close
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    document.getElementById('sidebar').classList.toggle('mobile-open', !isCollapsed);
    document.getElementById('sidebarBackdrop').classList.toggle('visible', !isCollapsed);
  }
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const icon = isDark ? '🌙' : '☀️';
  document.getElementById('themeBtn').textContent = icon;
  const hdr = document.getElementById('headerThemeBtn');
  if (hdr) hdr.textContent = icon;
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}

function copyWechat() {
  const num = '15527321668';
  navigator.clipboard.writeText(num).then(() => {
    const el = document.getElementById('wechatContact');
    const orig = el.textContent;
    el.textContent = '✅ 已复制 ' + num;
    el.style.borderColor = 'var(--green)';
    setTimeout(() => {
      el.textContent = orig;
      el.style.borderColor = '';
    }, 2000);
  }).catch(() => {
    alert('微信号: ' + num);
  });
}

// ============================================================
// PAPER SELECTION
// ============================================================
function selectPaper(id) {
  currentPaperId = id;
  const paper = PAPERS.find(p => p.id === id);
  if (!paper) return;

  // Auto-close sidebar on mobile
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarBackdrop').classList.remove('visible');
  }

  // Update sidebar active state
  document.querySelectorAll('.paper-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  // Update paper header
  const stars = '⭐'.repeat(paper.harScore) + '☆'.repeat(5 - paper.harScore);
  document.getElementById('paperMetaLine').innerHTML = `#${String(paper.id).padStart(2,'0')} · ${paper.date} · Harness ${stars}`;
  document.getElementById('paperZhTitle').textContent = paper.zhTitle;
  document.getElementById('paperEnTitle').textContent = paper.enTitle;
  document.getElementById('paperMeta').textContent = `${paper.authors} · ${paper.venue}`;
  document.getElementById('paperHeader').style.display = 'block';

  // Show PDF download button
  const dlBtn = document.getElementById('downloadBtn');
  if (paper.pdfFile) {
    dlBtn.href = '/deepseek/' + paper.pdfFile;
    dlBtn.style.display = 'inline-flex';
  } else {
    dlBtn.style.display = 'none';
  }
  // Show WeChat contact
  document.getElementById('wechatContact').style.display = 'inline-flex';
  // Show header theme button
  document.getElementById('headerThemeBtn').style.display = 'inline-flex';
  document.getElementById('tabsContainer').style.display = 'block';

  // Build overview content
  buildOverview(paper);

  // Load markdown tabs
  loadMDTab('thinkingContent', paper.thinkFile);
  loadMDTab('translationContent', paper.zhFile);
  loadMDTab('originalContent', paper.enFile);

  switchTab('overview');
}

function buildOverview(p) {
  const stars = '⭐'.repeat(p.harScore) + '☆'.repeat(5 - p.harScore);
  const html = `
    <div class="metrics-grid fade-in">${p.metrics.map(m =>
      `<div class="metric-card"><div class="value">${m.value}</div><div class="label">${m.label}</div></div>`
    ).join('')}</div>

    ${p.problems && p.problems.length ? `
    <div class="section-block fade-in fade-in-d1">
      <div class="section-title"><span class="num">1</span> 核心挑战与方案</div>

          ` : ''}
        `).join('')}
      </div>
    </div>` : ''}

    <div class="section-block fade-in fade-in-d2">
      <div class="section-title"><span class="num">2</span> 关键技术洞察</div>
      <div class="insight-grid">${p.insights.map(i =>
        `<div class="insight-card"><span class="emoji-icon">${i.emoji}</span><h4>${i.title}</h4><p>${i.desc}</p></div>`
      ).join('')}</div>
    </div>

    <div class="section-block fade-in fade-in-d3">
      <div class="section-title"><span class="num">3</span> 核心结果</div>
      ${p.highlights ? p.highlights.map(h => `
        <div class="highlight-box"><h4>${h.title}</h4><p>${h.text}</p></div>
      `).join('') : ''}
      ${p.resultsTables ? p.resultsTables.map(t => `
        ${t.title ? `<div class="highlight-box" style="margin-top:12px;"><h4>${t.title}</h4></div>` : ''}
        <div class="results-table-wrap"><table>
          <tr>${t.headers.map(h => `<th>${h}</th>`).join('')}</tr>
          ${t.rows.map(r => `<tr>${r.map(c => `<td${/^[+\d$]/.test(c) ? ' class="highlight"' : ''}>${c}</td>`).join('')}</tr>`).join('')}
        </table></div>
      `).join('') : ''}
    </div>

    <div class="section-block fade-in fade-in-d4">
      <div class="section-title"><span class="num">4</span> Harness 关联度 ${stars}</div>
      <div class="highlight-box" style="border-left:3px solid var(--orange);">
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.7;">
          该论文与 <strong>LLM + Harness = Agent</strong> 理论框架的关联程度为 <strong>${stars}</strong>（共 5 星）。
          ${p.harScore >= 5 ? '直接对应多个 Harness 组件，是研究核心参考。' :
            p.harScore >= 4 ? '与 Harness 理论有强关联，对应至少 2 个核心组件。' :
            p.harScore >= 3 ? '部分设计思想与 Harness 组件相通。' :
            '底层技术关联，间接启发 Harness 层设计。'}
        </p>
      </div>
    </div>
  `;
  document.getElementById('overviewContent').innerHTML = html;
}

async function loadMDTab(containerId, filePath) {
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="md-loading"><div class="spinner"></div><p>加载中...</p></div>`;
  try {
    // Always use absolute path with /deepseek/ prefix so it works from any page URL
    const fullPath = '/deepseek/' + filePath;
    const resp = await fetch(fullPath);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const md = await resp.text();
    container.innerHTML = `<div class="md-content">${mdToHtml(md)}</div>`;
  } catch(e) {
    container.innerHTML = `<div class="md-error"><p style="font-size:16px;margin-bottom:6px;">⚠️ 加载失败</p><p>请直接查看 <a href="/deepseek/${filePath}" style="color:var(--accent);text-decoration:underline;">源文件</a></p><p style="font-size:12px;margin-top:6px;opacity:0.5;">${e.message}</p></div>`;
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes(name));
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ============================================================
// MARKDOWN RENDERER (Simple, safe)
// ============================================================
function mdToHtml(text) {
  let html = text;
  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/m, '<h1>$1</h1>');
  // Bold/italic
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Blockquote
  html = html.replace(/^> (.*)$/gm, '<blockquote>$1</blockquote>');
  // HR
  html = html.replace(/^---$/gm, '<hr>');
  // List items
  html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
  html = html.replace(/^\d+\. (.*)$/gm, '<li>$1</li>');
  // Paragraphs
  html = html.replace(/\n\n/g, '</p><p>');
  html = '<p>' + html + '</p>';
  // Fix nesting
  html = html.replace(/<p><h([1-4])>/g, '<h$1>');
  html = html.replace(/<\/h([1-4])><\/p>/g, '</h$1>');
  html = html.replace(/<p><(li|blockquote|hr)>/g, '<$1>');
  html = html.replace(/<(li|blockquote|hr)><\/p>/g, '<$1>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*?<\/li>(\s*<li>.*?<\/li>)*)/gs, '<ul>$1</ul>');
  return html;
}
